# .github/workflows/ecosystem.yml
# Substrate Ecosystem — Automated Daily Health Monitoring
#
# This workflow runs the complete substrate integrity ecosystem daily,
# generates reports, and publishes results to GitHub Pages.
#
# Security hardening:
#   - All actions pinned to specific SHAs
#   - Error handling throughout
#   - Sensitive data redaction
#   - Read-only token by default
#   - Historical data preservation
#
# License: CC0 1.0 Universal (Public Domain Dedication)

name: Substrate Ecosystem

on:
  schedule:
    # Daily at 00:00 UTC
    - cron: '0 0 * * *'
  push:
    branches: [ main, master ]
    paths:
      - '**.py'
      - '**.yml'
      - '**.yaml'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug output'
        type: boolean
        default: false
      run_sim_only:
        description: 'Run simulation only (skip real model tests)'
        type: boolean
        default: true

# Permissions — minimal required
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-progress runs if new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ecosystem:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Hard limit to prevent runaway
    
    # Environment variables
    env:
      PYTHONUNBUFFERED: 1
      ECOSYSTEM_DATA_DIR: ecosystem_data
      HEALTH_THRESHOLD: 0.75
      AUTO_HEAL: true
      DEBUG: ${{ inputs.debug || false }}
      RUN_SIM_ONLY: ${{ inputs.run_sim_only || true }}

    steps:
      # Step 1: Checkout — pinned SHA for security
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
        with:
          fetch-depth: 0  # Full history for accurate timestamps
          persist-credentials: false  # Use GITHUB_TOKEN instead

      # Step 2: Setup Python — pinned SHA
      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d  # v5.1.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
            setup.py

      # Step 3: Install dependencies
      - name: Install dependencies
        id: install
        run: |
          set -e  # Exit on any error
          echo "📦 Installing dependencies..."
          
          # Install standard library only — no external packages needed
          # But we need numpy for simulation
          pip install --upgrade pip
          pip install numpy matplotlib --quiet
          
          echo "✅ Dependencies installed"
        shell: bash

      # Step 4: Run ecosystem
      - name: Run ecosystem
        id: ecosystem
        timeout-minutes: 45  # Sub-step timeout
        run: |
          set -e  # Exit on any error
          echo "🌱 Running Substrate Ecosystem..."
          
          # Create data directory
          mkdir -p "${ECOSYSTEM_DATA_DIR}"
          
          # Run the ecosystem
          if [ "${RUN_SIM_ONLY}" = "true" ]; then
            # Run simulation only (safe for CI)
            python3 -m sim --ci --output "${ECOSYSTEM_DATA_DIR}/sim_results.json"
          else
            # Run full ecosystem
            python3 substrate_ecosystem.py \
              --start \
              --auto-heal \
              --data-dir "${ECOSYSTEM_DATA_DIR}" \
              --interval 3600 \
              --max-runtime 45
          fi
          
          # Generate report
          python3 publish_report.py \
            --data-dir "${ECOSYSTEM_DATA_DIR}" \
            --output ecosystem_report.html
          
          # Export convergence table
          python3 substrate_evolution_tracker.py \
            --export \
            --output CONVERGENCE_TABLE.md \
            --data-dir "${ECOSYSTEM_DATA_DIR}"
          
          echo "✅ Ecosystem run complete"
          
          # Record results for later steps
          echo "report_path=ecosystem_report.html" >> $GITHUB_OUTPUT
          echo "convergence_path=CONVERGENCE_TABLE.md" >> $GITHUB_OUTPUT
          echo "data_dir=${ECOSYSTEM_DATA_DIR}" >> $GITHUB_OUTPUT
        shell: bash
        env:
          # Redact sensitive data from logs
          PYTHONHASHSEED: random

      # Step 5: Validate results
      - name: Validate results
        id: validate
        if: always() && steps.ecosystem.outcome == 'success'
        run: |
          set -e
          echo "🔍 Validating results..."
          
          # Check that report was generated
          if [ ! -f "ecosystem_report.html" ]; then
            echo "❌ Report not generated"
            exit 1
          fi
          
          # Check that convergence table was updated
          if [ ! -f "CONVERGENCE_TABLE.md" ]; then
            echo "❌ Convergence table not generated"
            exit 1
          fi
          
          # Check data directory has content
          if [ ! -d "${ECOSYSTEM_DATA_DIR}" ] || [ -z "$(ls -A ${ECOSYSTEM_DATA_DIR})" ]; then
            echo "❌ No data collected"
            exit 1
          fi
          
          echo "✅ Validation passed"
        shell: bash

      # Step 6: Prepare artifacts
      - name: Prepare artifacts
        id: artifacts
        if: always()
        run: |
          set -e
          echo "📦 Preparing artifacts..."
          
          # Create artifact directory
          mkdir -p artifacts
          
          # Copy all results
          cp ecosystem_report.html artifacts/ 2>/dev/null || true
          cp CONVERGENCE_TABLE.md artifacts/ 2>/dev/null || true
          cp -r "${ECOSYSTEM_DATA_DIR}" artifacts/ 2>/dev/null || true
          
          # Generate summary
          echo "## Ecosystem Summary" > artifacts/SUMMARY.md
          echo "" >> artifacts/SUMMARY.md
          echo "- Run: ${{ github.run_id }}" >> artifacts/SUMMARY.md
          echo "- Time: $(date -u)" >> artifacts/SUMMARY.md
          echo "- Status: ${{ job.status }}" >> artifacts/SUMMARY.md
          echo "- Sim-only: ${RUN_SIM_ONLY}" >> artifacts/SUMMARY.md
          
          echo "✅ Artifacts prepared"
        shell: bash

      # Step 7: Upload artifacts
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@1746f4ab65b179e0ea60a494b83293b640dd5bba  # v4.4.0
        with:
          name: ecosystem-results
          path: artifacts/
          retention-days: 30
          if-no-files-found: warn

      # Step 8: Commit results (only on main branch)
      - name: Commit results
        id: commit
        if: |
          always() &&
          github.ref == 'refs/heads/main' &&
          steps.validate.outcome == 'success' &&
          steps.ecosystem.outcome == 'success'
        run: |
          set -e  # Exit on any error — no silent failures
          echo "💾 Committing results..."
          
          # Configure git
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Check if there are changes
          if git diff --quiet; then
            echo "✅ No changes to commit"
            exit 0
          fi
          
          # Stage changes
          git add CONVERGENCE_TABLE.md ecosystem_report.html "${ECOSYSTEM_DATA_DIR}" || true
          
          # Commit with timestamp
          git commit -m "chore: ecosystem update $(date -u '+%Y-%m-%d %H:%M:%S')"
          
          # Push using GITHUB_TOKEN
          git push origin HEAD:${GITHUB_REF_NAME}
          
          echo "✅ Changes committed"
          echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 9: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deploy
        if: |
          always() &&
          github.ref == 'refs/heads/main' &&
          steps.validate.outcome == 'success'
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e  # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: true  # Preserve historical data
          force_orphan: false  # Don't destroy history
          user_name: 'github-actions[bot]'
          user_email: '41898282+github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs: ecosystem report ${{ github.run_id }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 10: Notify on failure
      - name: Notify on failure
        id: notify
        if: failure() && github.event_name != 'workflow_dispatch'
        run: |
          echo "⚠️ Ecosystem workflow failed!"
          echo "Run: ${{ github.run_id }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          
          # Create an issue for tracking
          if [ -n "${{ secrets.GITHUB_TOKEN }}" ]; then
            python3 - <<EOF
            import os
            import json
            import urllib.request
            
            token = os.environ.get('GITHUB_TOKEN')
            repo = os.environ.get('GITHUB_REPOSITORY')
            
            if token and repo:
              issue = {
                "title": f"Ecosystem failed: ${{ github.run_id }}",
                "body": f"""
                ## Ecosystem Failure Report
                
                - Run: ${{ github.run_id }}
                - Branch: ${{ github.ref_name }}
                - Commit: ${{ github.sha }}
                - Time: $(date -u)
                - Workflow: ${{ github.workflow }}
                
                ### Logs
                See: https://github.com/{repo}/actions/runs/${{ github.run_id }}
                """
              }
              
              req = urllib.request.Request(
                f"https://api.github.com/repos/{repo}/issues",
                data=json.dumps(issue).encode('utf-8'),
                headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
                },
                method="POST"
              )
              try:
                with urllib.request.urlopen(req) as response:
                  print("✅ Issue created")
              except Exception as e:
                print(f"⚠️ Could not create issue: {e}")
            EOF
          fi
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      # Step 11: Clean up
      - name: Clean up
        if: always()
        run: |
          echo "🧹 Cleaning up..."
          # Remove large files to free space
          find . -name "*.pyc" -delete 2>/dev/null || true
          find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          echo "✅ Cleanup complete"
        shell: bash

  # =====================================================================
  # SIMULATION ONLY JOB — Runs simulation tests in parallel
  # =====================================================================
  
  simulation-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: ecosystem
    if: always() && needs.ecosystem.outcome == 'success'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
        
      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d  # v5.1.0
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          set -e
          pip install numpy matplotlib --quiet
          
      - name: Run simulation tests
        id: sim_tests
        run: |
          set -e
          echo "🧪 Running simulation test suite..."
          
          # Run test harness
          python3 -c "
          from sim import TestHarness
          import json
          
          harness = TestHarness()
          suite = harness.run_all()
          
          # Print results
          report = harness.report()
          print(json.dumps(report, indent=2))
          
          # Save results
          with open('sim_test_results.json', 'w') as f:
              json.dump(report, f)
          "
          
          echo "✅ Simulation tests complete"
          
      - name: Upload simulation results
        if: always()
        uses: actions/upload-artifact@1746f4ab65b179e0ea60a494b83293b640dd5bba  # v4.4.0
        with:
          name: simulation-test-results
          path: sim_test_results.json
          retention-days: 14
